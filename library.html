<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Library - Campus Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0d12; --surface: #12151d; --card: #181b25; --card-hover: #1e2230;
      --border: rgba(255,255,255,0.07); --text: #eef0f7; --muted: rgba(238,240,247,0.42);
      --amber: #fbbf24; --font-h: 'Syne', sans-serif; --font-b: 'DM Sans', sans-serif;
    }
    html, body { height: 100%; font-family: var(--font-b); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 52px 52px;
    }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(11,13,18,0.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; height: 62px; padding: 0 1.5rem;
    }
    .back-btn {
      background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 13px; padding: 6px 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .back-btn:hover { background: var(--card-hover); }
    .content { position: relative; z-index: 1; padding: 2rem; max-width: 600px; margin: 0 auto; animation: fadeUp 0.5s ease both; }
    h1 { font-family: var(--font-h); font-size: 28px; font-weight: 800; color: var(--amber); margin-bottom: 1rem; }
    p { color: var(--muted); font-size: 14px; margin-bottom: 2rem; }
    .mock-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between;}
    .mock-card div h3 { font-family: var(--font-h); font-size: 16px; margin-bottom: 4px; }
    .mock-card div div { font-size: 12px; color: var(--muted); }
    .mock-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--amber); padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: bold; }
    .mock-btn:hover { background: var(--card-hover); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="topbar">
    <a href="landingpages.html" class="back-btn">&larr; Back to Hub</a>
  </div>
  <div class="content">
    <h1>📚 Digital Library</h1>
    <p>Search the catalogue, request books, and check borrowed items.</p>
    <div class="mock-card" style="display:block;">
      <input type="text" placeholder="Search for books, papers..." style="width:100%; padding: 12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:white; font-family:inherit; margin-bottom: 1rem; outline:none;">
      <button class="mock-btn" style="width:100%; background:var(--amber); color:black;" onclick="alert('Demo: Searching...')">Search Catalogue</button>
    </div>
    <div class="mock-card">
      <div><h3>Borrowed: Advanced Calculus</h3><div>Due in 4 days</div></div>
      <button class="mock-btn" style="color:var(--amber)" onclick="alert('Demo: Renewing...')">Renew</button>
    </div>
  </div>
</body>
</html>
